name: Glints Hourly Scraper

on:
  schedule:
    # 90-minute interval logic:
    # 00:00, 03:00, 06:00... (Every 3 hours)
    - cron: '0 0/3 * * *'
    # 01:30, 04:30, 07:30... (Offset by 1.5 hours)
    - cron: '30 1/3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Puppeteer Browser
      run: npx puppeteer browsers install chrome
      env:
        PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache

    - name: Run Scraper
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
        WHATSAPP_TARGET: ${{ secrets.WHATSAPP_TARGET }}
        # Puppeteer cache configuration for GHA
        PUPPETEER_CACHE_DIR: ${{ github.workspace }}/.cache
      run: node scraper.js
